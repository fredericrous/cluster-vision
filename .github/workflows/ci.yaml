name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  go:
    name: Go Build & Test
    runs-on: cluster-vision
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          only-new-issues: true

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build ./...

  web:
    name: Web Build & Typecheck
    runs-on: cluster-vision
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  migration-check:
    name: Migration check (prod-data clone)
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: cluster-vision
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      MC_NS: migration-check
      MC_NAME: cv-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kubectl
        run: |
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure in-cluster kubeconfig (scoped SA)
        run: |
          SA=/var/run/secrets/kubernetes.io/serviceaccount
          kubectl config set-cluster k8s \
            --server="https://kubernetes.default.svc" \
            --certificate-authority="$SA/ca.crt" --embed-certs=true
          kubectl config set-credentials sa --token="$(cat $SA/token)"
          kubectl config set-context ctx --cluster=k8s --user=sa --namespace="$MC_NS"
          kubectl config use-context ctx

      - name: Request a prod-data clone (MigrationCheck)
        run: |
          cat <<YAML | kubectl apply -f -
          apiVersion: preview.homelab.io/v1
          kind: MigrationCheck
          metadata:
            name: ${MC_NAME}
            namespace: ${MC_NS}
          spec:
            appName: cluster-vision
            ttlSeconds: 1800
          YAML

      - name: Wait for clone to be Ready
        run: |
          for i in $(seq 1 120); do   # up to ~10m for snapshot + CNPG bootstrap
            phase=$(kubectl -n "$MC_NS" get migrationcheck "$MC_NAME" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            echo "phase=$phase ($i)"
            case "$phase" in
              Ready)  exit 0 ;;
              Failed) echo "::error::MigrationCheck failed: $(kubectl -n "$MC_NS" get migrationcheck "$MC_NAME" -o jsonpath='{.status.message}')"; exit 1 ;;
            esac
            sleep 5
          done
          echo "::error::clone did not become Ready in time"; exit 1

      - name: Read clone DATABASE_URL
        id: db
        run: |
          secret=$(kubectl -n "$MC_NS" get migrationcheck "$MC_NAME" -o jsonpath='{.status.connectionSecretName}')
          url=$(kubectl -n "$MC_NS" get secret "$secret" -o jsonpath='{.data.DATABASE_URL}' | base64 -d)
          echo "::add-mask::$url"
          echo "database_url=$url" >> "$GITHUB_OUTPUT"

      - name: Build the Go API
        run: go build -o cv-api ./cmd

      # Boot the Go API against the prod-data clone. The API owns the EAM
      # database: server.New -> store.New runs the embedded golang-migrate
      # migrations against DATABASE_URL before the HTTP server listens. When
      # that succeeds the DB pool is wired (s.db != nil), which /api/config
      # reports as {"eam":true} — so eam:true proves the migrations applied
      # cleanly against real data. (We gate on /api/config, not /api/health:
      # a migration failure is logged and leaves EAM disabled rather than
      # crashing, so /api/health would still 200; and /api/health also
      # requires live cluster discovery the scoped CI SA can't perform.)
      - name: Run migrations + serve against clone
        env:
          DATABASE_URL: ${{ steps.db.outputs.database_url }}
        run: |
          ./cv-api -port 8080 & SERVER_PID=$!
          ok=
          for i in $(seq 1 60); do   # generous: migrations run on first boot
            if curl -fsS http://localhost:8080/api/config | grep -q '"eam":true'; then ok=1; break; fi
            sleep 2
          done
          kill $SERVER_PID 2>/dev/null || true
          [ -n "$ok" ] || { echo "::error::migrations failed against the prod-data clone (EAM did not come up)"; exit 1; }
          echo "migrations applied + EAM up against prod-data clone"

      - name: Tear down the clone
        if: always()
        run: kubectl -n "$MC_NS" delete migrationcheck "$MC_NAME" --ignore-not-found --wait=false
