apiVersion: v1
kind: Service
metadata:
  name: {{ include "cluster-vision.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluster-vision.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: web
      protocol: TCP
      name: web
    # API port — exposes /metrics for Prometheus scrape and (in-cluster
    # only) the JSON API. Public ingress via the chart's HTTPRoute still
    # uses the web port.
    - port: {{ .Values.api.port }}
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "cluster-vision.selectorLabels" . | nindent 4 }}
