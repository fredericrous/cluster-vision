replicaCount: 1

image:
  repository: ghcr.io/fredericrous/cluster-vision
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

api:
  port: 8080

web:
  port: 3000

service:
  type: ClusterIP
  port: 3000

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

# Name of the local cluster (shown in security table). Defaults to "Homelab" in code.
clusterName: ""

# Infrastructure data sources — each is mounted from a Kubernetes Secret.
# Use ExternalSecrets to sync from Vault, then reference the secret here.
dataSources: []
# dataSources:
#   - name: Homelab
#     type: tfstate           # "tfstate", "docker-compose", or "kubernetes"
#     secret:
#       name: infra-tfstate   # K8s Secret name
#       key: terraform.tfstate # key within the Secret
#   - name: NAS
#     type: kubernetes
#     platform: "QNAP"       # optional: platform name shown in Nodes page Provider column
#     secret:
#       name: nas-kubeconfig
#       key: kubeconfig

# OCI registry proxy host:port (e.g. Zot). When set, the version checker resolves
# upstream registry URLs instead of querying the proxy (which only has cached tags).
registryProxy: ""

refresh: 5m

# Optional: inject env vars from a Secret (e.g. DATABASE_URL, LITELLM_URL for EAM features)
# envFrom:
#   - secretRef:
#       name: cluster-vision-eam-secrets
#       optional: true
envFrom: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
